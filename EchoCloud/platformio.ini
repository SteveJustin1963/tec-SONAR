; ============================================================
;  EchoCloud — PlatformIO Build Configuration
;  Board: ESP32 DevKit V1 (WROOM-32)
;
;  Install PlatformIO:   pip install platformio
;  Build:                pio run
;  Upload:               pio run --target upload
;  Monitor:              pio device monitor --baud 115200
;  Clean:                pio run --target clean
; ============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud rate
monitor_speed = 115200

; Build flags — enable C99/C++17, optimise for speed
build_flags =
    -std=gnu++17
    -O2
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=0

; Source files
src_dir = firmware/EchoCloud

; Libraries
; ESP32Servo is only needed when SERVO_ENABLED = 1
; Uncomment the line below if you enable servo support:
; lib_deps = madhephaestus/ESP32Servo @ ^0.13.0
